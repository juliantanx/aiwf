name: AI Code Review

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install aiwf
        run: npm install -g aiwf

      - name: Initialize aiwf
        run: aiwf init --path .
        continue-on-error: true

      - name: Run code review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          aiwf run code-review \
            --input diff="$(git diff origin/${{ github.base_ref }}...HEAD)" \
            --output review-output.json \
            --format json

      - name: Post PR Comment
        if: always() && hashFiles('review-output.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('review-output.json')) {
              const output = JSON.parse(fs.readFileSync('review-output.json', 'utf8'));
              const summary = output.output?.summary || output.output?.report || 'Review completed';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🤖 AI Code Review\n\n${summary}`
              });
            }
